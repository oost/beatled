<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      CSP for the production build. connect-src allows any http(s) origin
      because the API host is user-configurable (Config view) and may be
      cross-origin; style-src needs 'unsafe-inline' for Tailwind/Radix
      inline styles. The dev server strips this tag (see vite.config.ts)
      since Vite/HMR needs inline scripts and a WebSocket.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https: http:; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <title>Beatled</title>

    <meta name="description" content="Beatled beat detector, and led controller." />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5" />
    <meta name="msapplication-TileColor" content="#da532c" />
    <meta name="theme-color" content="#ffffff" />

    <link rel="shortcut icon" href="/favicon.ico" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
    <noscript>You need to enable Javascript to run this app.</noscript>
  </body>
</html>
