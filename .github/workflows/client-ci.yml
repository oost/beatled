name: Client CI

on:
  push:
    branches: [master, "feature/*"]
    paths:
      - "client/**"
      - ".github/workflows/client-ci.yml"
  pull_request:
    paths:
      - "client/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Lint
        run: npm run lint
        working-directory: client

      - name: Check formatting
        run: npm run format:check
        working-directory: client

      - name: Test
        run: npm test
        working-directory: client

      - name: Audit dependencies
        # High and critical vulnerabilities fail the build. Run `npm audit
        # fix` locally and commit the lockfile bump to clear them — the
        # bypass that used to live here (`continue-on-error: true`) was
        # the silent reason 24 high/critical CVEs accumulated.
        run: npm audit --audit-level=high
        working-directory: client

      - name: Build
        run: npm run build
        working-directory: client

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: client-build-logs
          path: client/dist
          retention-days: 7
