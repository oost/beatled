name: Server CI

on:
  push:
    branches: [master, "feature/*"]
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yml"
  pull_request:
    paths:
      - "server/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Check formatting
        run: |
          # Pin clang-format so CI matches what contributors run locally; the
          # unversioned apt package drifts between Ubuntu releases and would
          # reformat differently than the developer's version.
          pipx install clang-format==22.1.5
          find server/src -name '*.cpp' -o -name '*.hpp' -o -name '*.h' | \
            xargs clang-format --dry-run --Werror

      - name: Install system dependencies
        run: |
          sudo apt-get install -y ninja-build pkg-config libasound2-dev

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@305c06bd4dee21e23dcf142c85c657a993f7aa1a # v11
        with:
          vcpkgGitCommitId: "66c0373dc7fca549e5803087b9487edfe3aca0a1"

      - name: Configure CMake
        run: |
          cmake -S server -B server/build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
            -DBEATSERVER_ENABLE_TESTS=ON

      - name: Build
        run: cmake --build server/build

      - name: Run tests
        run: ctest --test-dir server/build --output-on-failure

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: server-build-logs
          path: server/build/**/*.log
          retention-days: 7
